<!DOCTYPE html>
<html lang="en">

<head>
    <title>Truecaller Auto-Fill</title>
    <script src="https://tele-sdk.truecaller.com/atp/1.0/sdk.js"></script>
</head>

<body>
    <h1>Register</h1>
    <form id="reg-form">
        <input type="text" id="fullname" placeholder="Full Name"><br><br>
        <input type="text" id="phone" placeholder="Phone Number"><br><br>
        <button type="submit">Submit Form</button>
    </form>

    <script>
        // Unique ID to identify this specific user session
        const requestId = 'id_' + Math.random().toString(36).substring(7);

        Truecaller.initialize({
            appKey: "YOUR_TRUECALLER_APP_KEY", // Get this from Truecaller Console
            requestId: requestId,
            callback: function (response) {
                if (response.status === 1) {
                    console.log("Truecaller success. Verifying...");
                    startPolling(requestId);
                }
            }
        });

        async function startPolling(id) {
            const poll = setInterval(async () => {
                const res = await fetch(`/api/check-status?requestId=${id}`);
                const data = await res.json();

                if (data.profile) {
                    clearInterval(poll);
                    // AUTO-FILL LOGIC
                    document.getElementById('fullname').value = data.profile.name;
                    document.getElementById('phone').value = data.profile.phoneNumber;
                }
            }, 2000);
        }
    </script>
</body>

</html>
